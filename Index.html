<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Habits</title>
<style>
/* =========================================================
   ATOMIC HABITS — tracker styles
   Palette:
     --paper:    #F1EBDD  (warm aged-paper background)
     --ink:      #2B2620  (near-black ink, not pure black)
     --rust:     #B5532C  (terracotta/rust accent — "completed" mark)
     --moss:     #5C6B4F  (muted green — secondary accent / streak)
     --line:     #D8CFB8  (hairline rule color)
     --paper-2:  #E7DECB  (slightly deeper paper, card bg)
   Type:
     Display: "Source Serif 4" / fallback serif — headings
     Body:    "Inter" — UI text
     Utility: "JetBrains Mono" — dates, numbers, streak counts
   Signature: the chain-link progress motif — each habit's history
   renders as a literal row of links (○●—○●) instead of a generic
   heat-grid, echoing "never miss twice / don't break the chain".
   ========================================================= */

@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --paper: #F1EBDD;
  --paper-2: #E7DECB;
  --ink: #2B2620;
  --ink-soft: #6B6357;
  --rust: #B5532C;
  --rust-soft: #D98B65;
  --moss: #5C6B4F;
  --line: #D8CFB8;
  --line-strong: #C7BC9E;
  --radius: 10px;
  --serif: "Source Serif 4", Georgia, serif;
  --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

body {
  background-image:
    radial-gradient(circle at 1px 1px, rgba(43,38,32,0.05) 1px, transparent 0);
  background-size: 22px 22px;
}

.app {
  max-width: 640px;
  margin: 0 auto;
  padding: 28px 20px 64px;
  min-height: 100vh;
}

button {
  font-family: var(--sans);
  cursor: pointer;
}

:focus-visible {
  outline: 2px solid var(--rust);
  outline-offset: 2px;
}

/* ===================== HEADER ===================== */

.header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 22px;
}

.header__mark {
  display: flex;
  align-items: center;
  margin-top: 10px;
  flex-shrink: 0;
}
.mark-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--rust);
  display: inline-block;
}
.mark-line {
  width: 9px;
  height: 2px;
  background: var(--ink-soft);
  display: inline-block;
}

.header__text { flex: 1; }

.header__title {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 30px;
  letter-spacing: -0.01em;
  margin: 0;
  line-height: 1.1;
}

.header__sub {
  margin: 4px 0 0;
  font-size: 13px;
  color: var(--ink-soft);
  font-style: italic;
  font-family: var(--serif);
}

.header__nav {
  display: flex;
  gap: 6px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px;
  flex-shrink: 0;
  margin-top: 8px;
}

.navbtn {
  border: none;
  background: transparent;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
  padding: 7px 13px;
  border-radius: 999px;
  transition: background .15s ease, color .15s ease;
}
.navbtn.is-active {
  background: var(--ink);
  color: var(--paper);
}

/* ===================== ADD HABIT ===================== */

.add-habit { margin-bottom: 26px; }

.add-habit__form {
  display: flex;
  gap: 8px;
}

.add-habit__input {
  flex: 1;
  border: 1px solid var(--line-strong);
  background: #fff;
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 14px;
  font-family: var(--sans);
  color: var(--ink);
}
.add-habit__input::placeholder { color: #A39B89; }
.add-habit__input:focus { border-color: var(--rust); }

.add-habit__btn {
  border: none;
  background: var(--rust);
  color: #fff;
  font-weight: 600;
  font-size: 13px;
  padding: 0 16px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  transition: background .15s ease;
}
.add-habit__btn:hover { background: #a04827; }
.add-habit__btn .plus { font-size: 16px; line-height: 1; }

/* ===================== DAY SWITCHER ===================== */

.day-switcher {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.day-switcher__btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--paper-2);
  font-size: 18px;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.day-switcher__btn:hover { background: var(--line); }

.day-switcher__current {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.day-switcher__date {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 18px;
}

.day-switcher__today {
  border: none;
  background: none;
  color: var(--rust);
  font-size: 11px;
  font-weight: 600;
  text-decoration: underline;
  padding: 0;
}

/* ===================== HABIT LIST ===================== */

.habit-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
}

.habit-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 12px;
  transition: border-color .15s ease, background .15s ease;
}

.habit-row.is-done {
  background: #FBF3E7;
  border-color: var(--rust-soft);
}

.habit-row__check {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--line-strong);
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
  transition: all .15s ease;
  padding: 0;
}
.habit-row__check:hover { border-color: var(--rust); }
.habit-row.is-done .habit-row__check {
  background: var(--rust);
  border-color: var(--rust);
  color: #fff;
}

.habit-row__name {
  flex: 1;
  font-size: 14.5px;
  font-weight: 500;
  color: var(--ink);
}
.habit-row.is-done .habit-row__name {
  color: var(--ink-soft);
  text-decoration: line-through;
  text-decoration-color: var(--rust-soft);
}

.habit-row__streak {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--moss);
  background: rgba(92,107,79,0.1);
  padding: 3px 7px;
  border-radius: 6px;
  flex-shrink: 0;
  white-space: nowrap;
}

.habit-row__chain {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.chain-link {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--line-strong);
}
.chain-link.is-filled { background: var(--moss); }
.chain-seg {
  width: 4px;
  height: 1px;
  background: var(--line-strong);
}
.chain-seg.is-filled { background: var(--moss); }

.habit-row__del {
  flex-shrink: 0;
  border: none;
  background: none;
  color: #C7BC9E;
  font-size: 16px;
  padding: 2px 4px;
  line-height: 1;
  transition: color .15s ease;
}
.habit-row__del:hover { color: var(--rust); }

.empty-state {
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 14px;
  padding: 30px 10px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
}

/* ===================== MONTH STRIP ===================== */

.month-strip {
  border-top: 1px solid var(--line);
  padding-top: 18px;
}

.month-strip__head {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 10px;
}

.month-strip__label {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--ink-soft);
  min-width: 120px;
  text-align: center;
}

.month-strip__nav {
  border: none;
  background: none;
  font-size: 15px;
  color: var(--ink-soft);
  padding: 2px 6px;
}
.month-strip__nav:hover { color: var(--ink); }

.month-strip__weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 10px;
  color: var(--ink-soft);
  margin-bottom: 4px;
  font-family: var(--mono);
}

.month-strip__grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.day-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  border-radius: 6px;
  border: 1px solid transparent;
  color: var(--ink-soft);
  background: transparent;
  position: relative;
}
.day-cell.is-blank { visibility: hidden; }

.day-cell.is-today {
  border-color: var(--rust);
  font-weight: 700;
  color: var(--rust);
}

.day-cell.is-selected {
  outline: 2px solid var(--ink);
  outline-offset: 1px;
}

.day-cell.has-full { background: var(--moss); color: #fff; }
.day-cell.has-partial { background: rgba(92,107,79,0.35); color: var(--ink); }
.day-cell.has-none { background: rgba(181,83,44,0.08); }

.month-strip__legend {
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: center;
  margin-top: 12px;
  font-size: 10px;
  color: var(--ink-soft);
  flex-wrap: wrap;
}
.legend-swatch {
  width: 9px;
  height: 9px;
  border-radius: 3px;
  display: inline-block;
  margin-left: 8px;
}
.legend-swatch--full { background: var(--moss); margin-left: 0; }
.legend-swatch--partial { background: rgba(92,107,79,0.35); }
.legend-swatch--none { background: rgba(181,83,44,0.08); border: 1px solid var(--line); }

/* ===================== REPORTS VIEW ===================== */

.report-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.reportbtn {
  flex: 1;
  border: 1px solid var(--line-strong);
  background: #fff;
  color: var(--ink-soft);
  font-weight: 600;
  font-size: 13px;
  padding: 10px;
  border-radius: var(--radius);
  transition: all .15s ease;
}
.reportbtn.is-active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.report-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 26px;
}

.stat-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 4px;
}
.stat-card__value {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 22px;
  color: var(--rust);
}
.stat-card__label {
  font-size: 10px;
  color: var(--ink-soft);
  line-height: 1.3;
}

.report-block { margin-bottom: 28px; }

.report-block__title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  margin: 0 0 12px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 8px;
}

.report-table {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.report-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.report-row__date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  width: 64px;
  flex-shrink: 0;
}
.report-row__bar-track {
  flex: 1;
  height: 8px;
  background: var(--paper-2);
  border-radius: 4px;
  overflow: hidden;
}
.report-row__bar-fill {
  height: 100%;
  background: var(--moss);
  border-radius: 4px;
}
.report-row__frac {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.habit-breakdown {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.breakdown-item__top {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 5px;
}
.breakdown-item__name { font-weight: 500; }
.breakdown-item__pct {
  font-family: var(--mono);
  color: var(--rust);
  font-weight: 600;
}
.breakdown-item__track {
  height: 10px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: 5px;
  overflow: hidden;
}
.breakdown-item__fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rust-soft), var(--rust));
}

.report-empty {
  text-align: center;
  color: var(--ink-soft);
  font-style: italic;
  font-family: var(--serif);
  font-size: 13px;
  padding: 18px;
}

/* ===================== RESPONSIVE ===================== */

@media (max-width: 480px) {
  .header { gap: 10px; }
  .header__title { font-size: 24px; }
  .header__nav { flex-direction: column; }
  .navbtn { padding: 6px 10px; }
  .habit-row__chain { display: none; }
  .add-habit__btn span:not(.plus) { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}

  </style>
</head>
<body>

<div class="app">

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header__mark" aria-hidden="true">
      <span class="mark-dot"></span><span class="mark-line"></span><span class="mark-dot"></span><span class="mark-line"></span><span class="mark-dot"></span>
    </div>
    <div class="header__text">
      <h1 class="header__title">Atomic Habits</h1>
      <p class="header__sub">1% better, every single day.</p>
    </div>
    <div class="header__nav">
      <button class="navbtn is-active" data-view="calendar" type="button">Calendar</button>
      <button class="navbtn" data-view="report" type="button">Reports</button>
    </div>
  </header>

  <!-- ===== Add habit ===== -->
  <section class="add-habit">
    <form id="habitForm" class="add-habit__form" autocomplete="off">
      <input
        type="text"
        id="habitInput"
        class="add-habit__input"
        placeholder="Add a new habit — e.g. Read 10 pages"
        maxlength="60"
        required
      >
      <button type="submit" class="add-habit__btn">
        <span class="plus">+</span> Add Habit
      </button>
    </form>
  </section>

  <!-- ===== Calendar view ===== -->
  <section id="calendarView" class="view view--calendar">

    <div class="day-switcher">
      <button id="prevDay" class="day-switcher__btn" type="button" aria-label="Previous day">&#8249;</button>
      <div class="day-switcher__current">
        <span id="currentDateLabel" class="day-switcher__date">—</span>
        <button id="todayBtn" class="day-switcher__today" type="button">Today</button>
      </div>
      <button id="nextDay" class="day-switcher__btn" type="button" aria-label="Next day">&#8250;</button>
    </div>

    <div id="habitList" class="habit-list">
      <!-- habit rows injected here -->
    </div>

    <p id="emptyState" class="empty-state" hidden>
      No habits yet. The chain starts with one link — add your first habit above.
    </p>

    <!-- Mini month grid for quick navigation + visual streak glance -->
    <div class="month-strip">
      <div class="month-strip__head">
        <button id="prevMonth" class="month-strip__nav" type="button" aria-label="Previous month">&#8249;</button>
        <span id="monthStripLabel" class="month-strip__label">—</span>
        <button id="nextMonth" class="month-strip__nav" type="button" aria-label="Next month">&#8250;</button>
      </div>
      <div class="month-strip__weekdays">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div id="monthGrid" class="month-strip__grid"></div>
      <div class="month-strip__legend">
        <span class="legend-swatch legend-swatch--full"></span> all done
        <span class="legend-swatch legend-swatch--partial"></span> some done
        <span class="legend-swatch legend-swatch--none"></span> none done
      </div>
    </div>

  </section>

  <!-- ===== Reports view ===== -->
  <section id="reportView" class="view view--report" hidden>

    <div class="report-toggle">
      <button class="reportbtn is-active" data-range="week" type="button">This Week</button>
      <button class="reportbtn" data-range="month" type="button">This Month</button>
    </div>

    <div class="report-summary">
      <div class="stat-card">
        <span class="stat-card__value" id="statCompletion">0%</span>
        <span class="stat-card__label">Completion rate</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__value" id="statBestStreak">0</span>
        <span class="stat-card__label">Best current streak</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__value" id="statTotal">0</span>
        <span class="stat-card__label">Habits completed</span>
      </div>
    </div>

    <div class="report-block">
      <h2 class="report-block__title" id="reportRangeLabel">This Week</h2>
      <div id="reportTable" class="report-table">
        <!-- rows injected here -->
      </div>
    </div>

    <div class="report-block">
      <h2 class="report-block__title">Per-habit breakdown</h2>
      <div id="habitBreakdown" class="habit-breakdown">
        <!-- bars injected here -->
      </div>
    </div>

  </section>

</div>

<script>
/* =========================================================
   ATOMIC HABITS — app logic
   Data model in localStorage under key "atomicHabits.v1":
   {
     habits: [ { id, name, createdAt } ],
     logs:   { "YYYY-MM-DD": { habitId: true, ... }, ... }
   }
   ========================================================= */

(function () {
  "use strict";

  const STORAGE_KEY = "atomicHabits.v1";

  /* ---------- date helpers ---------- */
  const pad = (n) => String(n).padStart(2, "0");
  const toKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const startOfDay = (d) => { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; };
  const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  const sameDay = (a, b) => toKey(a) === toKey(b);
  const WEEKDAY_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTH_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function formatDayLabel(d) {
    const today = startOfDay(new Date());
    if (sameDay(d, today)) return "Today";
    if (sameDay(d, addDays(today, -1))) return "Yesterday";
    if (sameDay(d, addDays(today, 1))) return "Tomorrow";
    return `${WEEKDAY_FULL[d.getDay()].slice(0,3)}, ${MONTH_FULL[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  }

  /* ---------- state ---------- */
  let state = loadState();
  let selectedDate = startOfDay(new Date());
  let stripMonthCursor = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  let currentReportRange = "week";
  let currentView = "calendar";

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { habits: [], logs: {} };
      const parsed = JSON.parse(raw);
      return {
        habits: Array.isArray(parsed.habits) ? parsed.habits : [],
        logs: parsed.logs && typeof parsed.logs === "object" ? parsed.logs : {}
      };
    } catch (e) {
      console.error("Failed to load Atomic Habits data:", e);
      return { habits: [], logs: {} };
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error("Failed to save Atomic Habits data:", e);
    }
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  /* ---------- DOM refs ---------- */
  const habitForm = document.getElementById("habitForm");
  const habitInput = document.getElementById("habitInput");
  const habitListEl = document.getElementById("habitList");
  const emptyStateEl = document.getElementById("emptyState");
  const currentDateLabel = document.getElementById("currentDateLabel");
  const prevDayBtn = document.getElementById("prevDay");
  const nextDayBtn = document.getElementById("nextDay");
  const todayBtn = document.getElementById("todayBtn");

  const monthGrid = document.getElementB
